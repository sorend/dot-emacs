name: make-check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  make-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox

      - name: Run make check
        env:
          CHECKFLAGS: --eval "(setq sorend-check-mode t)"
        run: make check
